apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dx-agents
  namespace: dx-agents
  labels:
    app.kubernetes.io/name: dx-agents
    app.kubernetes.io/part-of: dx-agents
spec:
  to:
    kind: Service
    name: dx-agents
    weight: 100
  port:
    targetPort: gateway
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
