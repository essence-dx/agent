apiVersion: apps/v1
kind: Deployment
metadata:
  name: dx-agents
  namespace: dx-agents
  labels:
    app.kubernetes.io/name: dx-agents
    app.kubernetes.io/part-of: dx-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dx-agents
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dx-agents
        app.kubernetes.io/part-of: dx-agents
    spec:
      containers:
        - name: dx-agents
          # For production, pin to a version tag (e.g. ghcr.io/millercarla211-ctrl/dx-agents:v0.8.0)
          image: ghcr.io/millercarla211-ctrl/dx-agents:latest
          args: ["daemon"]
          ports:
            - name: gateway
              containerPort: 42617
              protocol: TCP
          env:
            - name: DX_AGENTS_providers__models__anthropic__cloud__api_key
              valueFrom:
                secretKeyRef:
                  name: dx-agents-anthropic-api-key
                  key: api-key
            - name: LANG
              value: "C.UTF-8"
            - name: HOME
              value: "/dx-agent-data"
            - name: DX_AGENTS_DATA_DIR
              value: "/dx-agent-data/data"
            - name: DX_AGENTS_gateway__port
              value: "42617"
          volumeMounts:
            - name: state
              mountPath: /dx-agent-data/.dx_agent
            - name: config
              mountPath: /dx-agent-data/.dx_agent/config.toml
              subPath: config.toml
              readOnly: true
            - name: workspace
              mountPath: /dx-agent-data/workspace
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: dx-agents-config
        - name: state
          emptyDir: {}
        - name: workspace
          emptyDir: {}
